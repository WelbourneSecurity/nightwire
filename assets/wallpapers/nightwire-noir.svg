<svg xmlns="http://www.w3.org/2000/svg" width="3840" height="2160" viewBox="0 0 3840 2160">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#05060a"/>
      <stop offset="0.42" stop-color="#0a0b16"/>
      <stop offset="0.62" stop-color="#1a0b22"/>
      <stop offset="0.78" stop-color="#2a0d2e"/>
      <stop offset="1" stop-color="#06070c"/>
    </linearGradient>
    <radialGradient id="horizonGlow" cx="0.5" cy="0.58" r="0.55">
      <stop offset="0" stop-color="#ff2bd6" stop-opacity="0.55"/>
      <stop offset="0.35" stop-color="#7a1fff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#7a1fff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff5fc8"/>
      <stop offset="0.55" stop-color="#ff2bd6"/>
      <stop offset="1" stop-color="#27e7ff"/>
    </linearGradient>
    <linearGradient id="floorFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#06070c" stop-opacity="0"/>
      <stop offset="1" stop-color="#06070c" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bigGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="26" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- backdrop -->
  <rect width="3840" height="2160" fill="url(#sky)"/>
  <rect x="0" y="700" width="3840" height="900" fill="url(#horizonGlow)"/>

  <!-- distant skyline silhouette -->
  <g fill="#0a0c14" opacity="0.9">
    <rect x="120" y="980" width="120" height="200"/>
    <rect x="260" y="900" width="90" height="280"/>
    <rect x="372" y="1010" width="140" height="170"/>
    <rect x="540" y="850" width="80" height="330"/>
    <rect x="650" y="960" width="120" height="220"/>
    <rect x="3030" y="930" width="110" height="250"/>
    <rect x="3160" y="1000" width="90" height="180"/>
    <rect x="3270" y="870" width="130" height="310"/>
    <rect x="3420" y="980" width="100" height="200"/>
    <rect x="3540" y="920" width="120" height="260"/>
  </g>

  <!-- neon sun on the horizon -->
  <g filter="url(#bigGlow)">
    <circle cx="1920" cy="1180" r="300" fill="url(#sun)" opacity="0.92"/>
  </g>
  <g fill="#0a0b16">
    <rect x="1600" y="1120" width="640" height="14"/>
    <rect x="1600" y="1158" width="640" height="18"/>
    <rect x="1600" y="1202" width="640" height="24"/>
    <rect x="1600" y="1254" width="640" height="32"/>
  </g>

  <!-- horizon line -->
  <rect x="0" y="1180" width="3840" height="3" fill="#27e7ff" opacity="0.7" filter="url(#glow)"/>

  <!-- perspective floor grid: verticals radiating from the vanishing point -->
  <g stroke="#27e7ff" stroke-width="2" opacity="0.5">
    <line x1="1920" y1="1180" x2="-1400" y2="2160"/>
    <line x1="1920" y1="1180" x2="-380" y2="2160"/>
    <line x1="1920" y1="1180" x2="360" y2="2160"/>
    <line x1="1920" y1="1180" x2="840" y2="2160"/>
    <line x1="1920" y1="1180" x2="1200" y2="2160"/>
    <line x1="1920" y1="1180" x2="1480" y2="2160"/>
    <line x1="1920" y1="1180" x2="1710" y2="2160"/>
    <line x1="1920" y1="1180" x2="1920" y2="2160"/>
    <line x1="1920" y1="1180" x2="2130" y2="2160"/>
    <line x1="1920" y1="1180" x2="2360" y2="2160"/>
    <line x1="1920" y1="1180" x2="2640" y2="2160"/>
    <line x1="1920" y1="1180" x2="3000" y2="2160"/>
    <line x1="1920" y1="1180" x2="3480" y2="2160"/>
    <line x1="1920" y1="1180" x2="4220" y2="2160"/>
    <line x1="1920" y1="1180" x2="5240" y2="2160"/>
  </g>
  <!-- perspective floor grid: horizontals with increasing spacing -->
  <g stroke="#ff2bd6" stroke-width="2" opacity="0.42">
    <line x1="0" y1="1196" x2="3840" y2="1196"/>
    <line x1="0" y1="1224" x2="3840" y2="1224"/>
    <line x1="0" y1="1262" x2="3840" y2="1262"/>
    <line x1="0" y1="1312" x2="3840" y2="1312"/>
    <line x1="0" y1="1378" x2="3840" y2="1378"/>
    <line x1="0" y1="1464" x2="3840" y2="1464"/>
    <line x1="0" y1="1576" x2="3840" y2="1576"/>
    <line x1="0" y1="1720" x2="3840" y2="1720"/>
    <line x1="0" y1="1904" x2="3840" y2="1904"/>
    <line x1="0" y1="2140" x2="3840" y2="2140"/>
  </g>
  <rect x="0" y="1180" width="3840" height="980" fill="url(#floorFade)"/>

  <!-- wordmark -->
  <g font-family="Hack, Fira Code, monospace" text-anchor="middle">
    <text x="1920" y="640" font-size="220" font-weight="700" letter-spacing="26" fill="#eaf6ff" filter="url(#glow)">NIGHTWIRE</text>
    <text x="1920" y="740" font-size="40" letter-spacing="22" fill="#27e7ff" opacity="0.85">C Y B E R &#160; N O I R &#160; W O R K S T A T I O N</text>
  </g>

  <!-- faint terminal chatter -->
  <g fill="#27e7ff" opacity="0.12" font-family="Hack, Fira Code, monospace" font-size="24">
    <text x="150" y="210">~$ nmap -sC -sV $TARGET</text>
    <text x="150" y="250">~$ nxc smb $TARGET -u user -p pass</text>
    <text x="3060" y="230">~$ ligolo-ng -selfcert</text>
    <text x="3060" y="270">~$ feroxbuster -u http://$TARGET</text>
  </g>
</svg>
