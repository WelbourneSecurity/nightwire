name: ci

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:
  lint-test-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install test tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt bats zip

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Dry-run smoke test
        run: |
          sudo ./install.sh \
            --profile light \
            --shell both \
            --desktop none \
            --runtime none \
            --browser none \
            --labs none \
            --yes \
            --dry-run \
            --log-file /tmp/nightwire-dryrun.log

      - name: Package
        run: |
          zip -r nightwire.zip . \
            -x '*.git*' \
            -x 'nightwire.zip'
          sha256sum nightwire.zip > nightwire.zip.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nightwire
          path: |
            nightwire.zip
            nightwire.zip.sha256

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            nightwire.zip
            nightwire.zip.sha256
